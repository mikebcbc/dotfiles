---
- defaults:
    link:
        create: true
        force: true
        relink: true
    shell:
        stderr: true
        stdout: true
- shell:
    - [git submodule update --init --recursive, Installing submodules]
- create:
    - ~/projects
    - ~/.config
    - ~/.config/git
    - '~/Library/Application Support/lazygit'
- shell:
    # lazygit may leave an empty regular config.yml here; dotbot cannot replace that with a symlink until it is removed
    - [
        sh,
        -c,
        'f="$HOME/Library/Application Support/lazygit/config.yml"; if [ -f "$f" ] && [ ! -L "$f" ] && [ ! -s "$f" ]; then rm -f "$f"; fi',
      ]
- clean:
    - '~'
- shell:
    - [brew bundle, Installing Homebrew formulas from Brewfile]
    - [poetry config virtualenvs.in-project true]
- link:
    ~/.config/borders: borders
    ~/.config/fish: fish
    ~/.config/nvim: nvim
    ~/.config/skhd: skhd
    ~/.config/starship.toml: starship.toml
    ~/.config/git/config: git/config
    ~/.config/lazygit/config.yml: config/lazygit/config.yml
    '~/Library/Application Support/lazygit/config.yml': config/lazygit/config.yml
    ~/.config/wezterm: wezterm
    ~/.config/yabai: yabai
    ~/.config/zellij: zellij
    ~/.config/zed: zed
- shell:
    - [git submodule update --init --recursive, Installing submodules]
