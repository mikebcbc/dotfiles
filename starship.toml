palette = "catppuccin_macchiato"

[custom.neovim]
disabled = true # not needed
command = 'bob ls | rg Used | awk "{print \$2}"'
detect_folders = ["lua"]
style = "green"
format = "[¯İ½ $output ]($style)"
shell =["bash"]

[git_status]
# Empty `untracked`: skip scanning the working tree for untracked files (same idea as
# `git status --untracked-files=no`). That walk dominates cost in large repos.
untracked = ""
ignore_submodules = true
# Empty `renamed`: skip rename-tracking during the status pass (cheaper scan).
renamed = ""
staged = '[´üğ $count](bold green) '
stashed = "[¯ÁÁ ](cyan) "
deleted = '[´ü¿ $count](bold maroon) '
modified= '[¯®│ $count](bold blue) '
behind = '[¯½│ ](bold mauve) '
ahead = '[¯½┤ ](bold mauve) '

[[battery.display]]
threshold = 50

[lua]
detect_folders = []
symbol = "¯İá "

[git_metrics]
# Runs diff-based stats (+/- lines). Disabled for prompt speed; use `git diff --stat` when needed.
disabled = true

[git_commit]
# Omit short SHA segment ÔÇö avoids an extra git subprocess each prompt (`git_branch` still shows name).
disabled = true

